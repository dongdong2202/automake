server {
    listen 80;
    server_name tinylab.store;

    # ACME-challenge validation path for Certbot
    location /.well-known/acme-challenge/ {
        root /app/static/;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tinylab.store;

    ssl_certificate /etc/nginx/certs/live/tinylab.store/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/tinylab.store/privkey.pem;

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 静态文件目录
    location /static/ {
        alias /app/static/;
    }

    # 媒体文件目录
    location /media/ {
        alias /app/media/;
    }

    # 反向代理至宿主机运行的 Django 开发服务器 (8000端口)
    location / {
        proxy_pass http://172.19.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 反向代理 WebSocket 连接至 EMQX (8083端口)
    location /mqtt {
        proxy_pass http://emqx:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
